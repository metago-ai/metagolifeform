name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# 同一 PR/push 新提交时取消旧构建
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==================== 主测试任务 ====================
  test:
    name: Test & Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci
        working-directory: packages/mcp-server

      - name: Install engine devDependencies
        run: npm install
        working-directory: packages/engine

      - name: Type check & Build mcp-server
        run: |
          npm run build
        working-directory: packages/mcp-server

      - name: Build engine
        run: npm run build
        working-directory: packages/engine

      - name: Run mcp-server tests
        run: npm test
        working-directory: packages/mcp-server
        env:
          CI: true

      - name: Run engine tests (legacy)
        run: npm run test:legacy || true
        working-directory: packages/engine
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: |
            packages/mcp-server/dist/
            packages/engine/RUNTIME/dist/
          retention-days: 7

  # ==================== 包预校验任务 ====================
  pack-check:
    name: NPM Pack Dry-Run Check
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install & Build mcp-server
        run: |
          npm ci
          npm run build
        working-directory: packages/mcp-server

      - name: Verify tarball (npm pack --dry-run)
        run: npm pack --dry-run --json
        working-directory: packages/mcp-server

      - name: Run tarball test
        run: npx vitest run tests/tarball.test.ts tests/metadata-consistency.test.ts
        working-directory: packages/mcp-server
